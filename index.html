<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"> 
  <title>GameHub</title>
  <link rel="stylesheet" href="staile.css">
</head>

<body>

<header>
  <div class="logo">GameHub</div>

  <input id="search" placeholder="Поиск игр...">

  <div class="panel">
    <button onclick="openCart()">🛒 <span id="cart">0</span></button>
    <button onclick="openFav()">❤️ <span id="fav">0</span></button>
    <span id="balance">💰 $230</span>
  </div>
</header>

<!-- 🎵 КНОПКА МУЗЫКИ -->
<button id="musicBtn" onclick="toggleMusic()">🎵 Музыка: OFF</button>

<section class="games">
  <h2>Магазин игр</h2>
  <div class="game-grid"></div>
</section>

<div id="popup"></div>

<!-- MODAL GAME -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h2 id="mTitle"></h2>
    <img id="mImg">
    <p id="mDesc"></p>
    <button onclick="closeModal()">Закрыть</button>
  </div>
</div>

<!-- FAVORITES -->
<div id="favModal" class="modal hidden">
  <div class="modal-content">
    <h2>❤️ Избранное</h2>
    <div id="favList"></div>
    <button onclick="closeFav()">Закрыть</button>
  </div>
</div>

<!-- CART -->
<div id="cartModal" class="modal hidden">
  <div class="modal-content">
    <h2>🛒 Корзина</h2>
    <div id="cartList"></div>
    <button onclick="closeCart()">Закрыть</button>
  </div>
</div>

<script src="main.js"></script>

</body>
</html>
